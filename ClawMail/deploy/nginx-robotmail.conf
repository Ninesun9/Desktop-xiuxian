server {
    listen 80;
    server_name robotmail.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name robotmail.example.com;

    ssl_certificate /etc/letsencrypt/live/robotmail.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/robotmail.example.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:RobotMailSSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:5180;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }
}
